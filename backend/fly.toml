# fly.toml app configuration file for luna-finance-api
# Optimized for cost on 2026-05-02
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'luna-finance-api'
primary_region = 'gru'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '4000'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'    
  auto_start_machines = true     
  min_machines_running = 0       

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'               
  cpus = 1